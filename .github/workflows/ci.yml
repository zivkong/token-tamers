name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default GITHUB_TOKEN: read-only. No job in this workflow needs write access.
permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint (ESLint, incl. import-boundary + determinism rules)
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Zero-network check
        run: bash scripts/check-zero-network.sh
      - name: Spoiler check
        run: bash scripts/check-spoilers.sh
      - name: Zero-runtime-dependencies check
        run: bash scripts/check-runtime-deps.sh
      - name: Workflow pin check (all actions pinned to commit SHAs)
        run: bash scripts/check-workflow-pins.sh
      - name: Kebab-case filename check
        run: bash scripts/check-kebab-case.sh
      - name: Audit production dependencies
        run: pnpm audit --prod
      - name: Audit dev dependencies (advisory)
        run: pnpm audit --audit-level high || true

  smoke:
    name: Smoke (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: tt --version runs
        run: node apps/cli/dist/tt.js --version
