name: Release

on:
  push:
    tags:
      - 'v*'

# Default GITHUB_TOKEN: read-only. The publish job opts into write where needed.
permissions:
  contents: read

jobs:
  # Build each platform's standalone binaries on its NATIVE runner. Cross-building
  # everything on Linux is what broke the previous release: pkg could not ad-hoc
  # sign the macOS executables (Apple Silicon kernel-kills unsigned binaries) and
  # cross-target bytecode generation hit write EPIPE. Native runners avoid both;
  # --fallback-to-source keeps the one remaining cross-target (linux-arm64 on an
  # x64 runner) from failing bytecode generation.
  build:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            targets: node22-linux-x64,node22-linux-arm64
          - os: macos-latest
            targets: node22-macos-x64,node22-macos-arm64
          - os: windows-latest
            targets: node22-win-x64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set version from tag
        shell: bash
        env:
          # Pass the ref through the environment, never interpolated into the
          # script body — a tag name is attacker-influenceable, so we validate it
          # as semver before it touches package.json (see CLAUDE.md supply-chain).
          TAG: ${{ github.ref_name }}
        run: bash scripts/set-version-from-tag.sh "$TAG"
      - run: pnpm build
      - name: Build standalone binaries
        shell: bash
        run: |
          mkdir -p out
          IFS=',' read -ra TARGETS <<< "${{ matrix.targets }}"
          for t in "${TARGETS[@]}"; do
            case "$t" in
              node22-linux-x64)   name=tt-linux-x64 ;;
              node22-linux-arm64) name=tt-linux-arm64 ;;
              node22-macos-x64)   name=tt-macos-x64 ;;
              node22-macos-arm64) name=tt-macos-arm64 ;;
              node22-win-x64)     name=tt-windows-x64.exe ;;
              *) echo "::error::unknown pkg target $t"; exit 1 ;;
            esac
            echo "Building $t -> out/$name"
            # Explicit --output per target: do NOT rely on pkg's derived filenames.
            pnpm exec pkg apps/cli/dist/tt.cjs --target "$t" --fallback-to-source --output "out/$name"
          done
          ls -la out
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.os }}
          path: out/
          retention-days: 1
          if-no-files-found: error

  # Collect every platform's binaries, run the test gate once, attest provenance,
  # and publish the GitHub Release.
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # sign build provenance attestations (Sigstore)
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Set version from tag
        shell: bash
        env:
          # Validated as semver before touching package.json; see the build job.
          TAG: ${{ github.ref_name }}
        run: bash scripts/set-version-from-tag.sh "$TAG"
      - run: pnpm test
      - run: pnpm build # produces apps/cli/dist/tt.js (the ESM npm bin)
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dl
          pattern: binaries-*
          merge-multiple: true
      - name: Assemble release artifacts
        run: |
          mkdir -p out
          cp dl/* out/
          cp apps/cli/dist/tt.js out/tt.js
          cp scripts/install.sh out/install.sh
          cp scripts/uninstall.sh out/uninstall.sh
          cd out
          chmod +x tt-linux-* tt-macos-* tt.js install.sh uninstall.sh
          shasum -a 256 tt-* tt.js install.sh uninstall.sh > SHA256SUMS.txt
          ls -la

      - name: Attest build provenance (verifiable with `gh attestation verify`)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            out/tt-linux-x64
            out/tt-linux-arm64
            out/tt-macos-x64
            out/tt-macos-arm64
            out/tt-windows-x64.exe
            out/tt.js
            out/install.sh
            out/uninstall.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            out/tt-linux-x64
            out/tt-linux-arm64
            out/tt-macos-x64
            out/tt-macos-arm64
            out/tt-windows-x64.exe
            out/tt.js
            out/install.sh
            out/uninstall.sh
            out/SHA256SUMS.txt
