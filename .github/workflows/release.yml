name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      id-token: write # sign build provenance attestations (Sigstore)
      attestations: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build

      - name: Build standalone binaries (no Node required to run)
        run: |
          mkdir -p out
          pnpm exec pkg apps/cli/dist/tt.cjs \
            --targets node22-linux-x64,node22-linux-arm64,node22-macos-x64,node22-macos-arm64,node22-win-x64 \
            --out-path out
          cd out
          mv tt.cjs-linux-x64      tt-linux-x64
          mv tt.cjs-linux-arm64    tt-linux-arm64
          mv tt.cjs-macos-x64      tt-macos-x64
          mv tt.cjs-macos-arm64    tt-macos-arm64
          mv tt.cjs-win-x64.exe    tt-windows-x64.exe
          cp ../apps/cli/dist/tt.js tt.js
          cp ../scripts/install.sh install.sh
          cp ../scripts/uninstall.sh uninstall.sh
          shasum -a 256 tt-* tt.js install.sh uninstall.sh > SHA256SUMS.txt

      - name: Attest build provenance (verifiable with `gh attestation verify`)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: |
            out/tt-linux-x64
            out/tt-linux-arm64
            out/tt-macos-x64
            out/tt-macos-arm64
            out/tt-windows-x64.exe
            out/tt.js
            out/install.sh
            out/uninstall.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe # v2.4.2
        with:
          generate_release_notes: true
          files: |
            out/tt-linux-x64
            out/tt-linux-arm64
            out/tt-macos-x64
            out/tt-macos-arm64
            out/tt-windows-x64.exe
            out/tt.js
            out/install.sh
            out/uninstall.sh
            out/SHA256SUMS.txt
