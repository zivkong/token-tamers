version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Cooldown mirrors pnpm's minimumReleaseAge: never propose a version less
    # than 7 days old, so a compromised release is caught/yanked before we
    # even see the PR.
    cooldown:
      default-days: 7
    groups:
      dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
