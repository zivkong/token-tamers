name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint (ESLint, incl. import-boundary + determinism rules)
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Zero-network check
        run: bash scripts/check-zero-network.sh
      - name: Spoiler check
        run: bash scripts/check-spoilers.sh
      - name: Audit production dependencies
        run: pnpm audit --prod || true

  smoke:
    name: Smoke (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: tt --version runs
        run: node apps/cli/dist/tt.js --version
